name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system libraries for pysam
        run: sudo apt-get install -y libbz2-dev liblzma-dev libcurl4-openssl-dev zlib1g-dev

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pysam mappy pytest

      - name: Test with pytest
        run: pytest tests/test_scampiman.py